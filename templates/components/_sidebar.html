{# Component: _sidebar.html - Dashboard sidebar navigation                   #}
{# Context: active="apartments"|"inspections"|"reports"|"settings" (optional) #}
<aside class="flex h-full w-64 flex-col border-r border-border bg-white">
  <div class="flex items-center border-b border-border px-4 py-4">
    <span class="text-lg font-bold text-primary">BAKY</span>
  </div>
  <nav class="flex-1 space-y-1 px-3 py-4" aria-label="Dashboard-Navigation">
    <a href="{% url 'dashboard:index' %}"
       class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm {% if active == 'apartments' %}bg-surface font-medium text-primary{% else %}text-secondary hover:bg-surface hover:text-primary{% endif %}">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4" />
      </svg>
      Wohnungen
    </a>
    <a href="{% url 'dashboard:booking_calendar' %}"
       class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm {% if active == 'booking' %}bg-surface font-medium text-primary{% else %}text-secondary hover:bg-surface hover:text-primary{% endif %}">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
      Termin buchen
    </a>
    <span class="flex cursor-not-allowed items-center gap-3 rounded-lg px-3 py-2 text-sm text-secondary opacity-50">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      Berichte
    </span>
    <a href="{% url 'dashboard:subscription' %}"
       class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm {% if active == 'subscription' %}bg-surface font-medium text-primary{% else %}text-secondary hover:bg-surface hover:text-primary{% endif %}">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
      </svg>
      Abonnement
    </a>
  </nav>
  <div class="border-t border-border px-3 py-4 space-y-1">
    <a href="{% url 'dashboard:account_delete' %}"
       class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-secondary hover:bg-surface hover:text-primary">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      Konto
    </a>
    <form method="post" action="{% url 'accounts:logout' %}">
      {% csrf_token %}
      <button type="submit"
              class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm text-secondary hover:bg-surface hover:text-primary">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Abmelden
      </button>
    </form>
  </div>
</aside>
