{# HTMX response: booking failed #}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-primary/50 p-4"
     x-data="{ show: true }"
     x-show="show"
     x-transition>
  <div class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-xl">
    <div class="text-center">
      <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-rose-100">
        <svg class="h-6 w-6 text-rose-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </div>
      <h3 class="mt-3 text-lg font-semibold text-primary">Buchung fehlgeschlagen</h3>
      <p class="mt-2 text-sm text-secondary">{{ error }}</p>
      <button @click="show = false; document.getElementById('booking-result').innerHTML = ''"
              class="mt-4 inline-block rounded-lg border border-border px-4 py-2 text-sm font-medium text-primary transition hover:bg-surface">
        Schließen
      </button>
    </div>
  </div>
</div>
