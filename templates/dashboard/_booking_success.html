{# HTMX response: booking confirmed #}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-primary/50 p-4"
     x-data="{ show: true }"
     x-show="show"
     x-transition>
  <div class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-xl">
    <div class="text-center">
      <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-emerald-100">
        <svg class="h-6 w-6 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <h3 class="mt-3 text-lg font-semibold text-primary">Termin gebucht</h3>
      <p class="mt-1 text-sm text-secondary">{{ apartment.address }}</p>
      <p class="mt-1 text-sm font-medium text-primary">
        {{ inspection.scheduled_at|date:"d.m.Y" }}, {{ inspection.scheduled_at|date:"H:i" }}–{{ inspection.scheduled_end|date:"H:i" }} Uhr
      </p>
      <p class="mt-2 text-xs text-secondary">Ein Inspektor wird in Kürze zugewiesen.</p>
      <a href="{% url 'dashboard:booking_calendar' %}?apartment={{ apartment.pk }}"
         class="mt-4 inline-block rounded-lg bg-accent px-4 py-2 text-sm font-medium text-white transition hover:bg-amber-600">
        Zurück zum Kalender
      </a>
    </div>
  </div>
</div>
