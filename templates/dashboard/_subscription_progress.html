{# Subscription usage progress bar #}
<div class="rounded-xl border border-border bg-white px-4 py-3 shadow-sm">
  <div class="flex items-center justify-between">
    <span class="text-sm text-secondary">Inspektionen diesen Monat</span>
    <span class="text-sm font-semibold {% if availability.limit_reached %}text-rose-600{% else %}text-primary{% endif %}">
      {{ availability.used }}/{{ availability.limit }}
    </span>
  </div>
  <div class="mt-2 h-2 w-full overflow-hidden rounded-full bg-slate-100"
       role="progressbar"
       aria-valuenow="{{ availability.used }}"
       aria-valuemin="0"
       aria-valuemax="{{ availability.limit }}"
       aria-label="Inspektionen: {{ availability.used }} von {{ availability.limit }}">
    <div class="h-full rounded-full transition-all duration-300 {% if availability.percentage >= 100 %}bg-rose-500{% elif availability.percentage >= 75 %}bg-amber-500{% else %}bg-emerald-500{% endif %}"
         style="width: {{ availability.percentage }}%"></div>
  </div>
</div>
