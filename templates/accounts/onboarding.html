{% extends "base.html" %}
{% block title %}Einrichtung — BAKY{% endblock %}
{% block body %}
  <div class="min-h-screen bg-surface">
    {# Top bar #}
    <div class="border-b border-border bg-white">
      <div class="mx-auto flex max-w-3xl items-center justify-between px-4 py-4 sm:px-6">
        <span class="text-lg font-bold text-primary">BAKY</span>
        <span class="text-sm text-secondary">{{ request.user.get_full_name }}</span>
      </div>
    </div>
    {# Progress indicator #}
    <div class="mx-auto max-w-3xl px-4 pt-8 sm:px-6">{% include "accounts/_onboarding_progress.html" %}</div>
    {# Step content #}
    <div class="mx-auto max-w-3xl px-4 py-8 sm:px-6" id="onboarding-step">{% include step_template %}</div>
  </div>
{% endblock %}
