{% extends "base.html" %}
{% block title %}Passwort geändert — BAKY{% endblock %}
{% block body %}
  <div class="flex min-h-screen items-center justify-center bg-surface px-4">
    <div class="w-full max-w-md">
      <div class="rounded-2xl bg-white p-8 shadow-lg text-center">
        <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-emerald-100">
          <svg class="h-8 w-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-primary">Passwort geändert</h1>
        <p class="mt-4 text-sm text-secondary">Ihr Passwort wurde erfolgreich geändert. Sie können sich jetzt anmelden.</p>
        <a href="{% url 'accounts:login' %}"
           class="mt-6 inline-block rounded-lg bg-primary px-6 py-3 font-semibold text-white transition hover:bg-slate-700">
          Jetzt anmelden
        </a>
      </div>
    </div>
  </div>
{% endblock %}
