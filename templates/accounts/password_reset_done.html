{% extends "base.html" %}
{% block title %}E-Mail gesendet — BAKY{% endblock %}
{% block body %}
  <div class="flex min-h-screen items-center justify-center bg-surface px-4">
    <div class="w-full max-w-md">
      <div class="rounded-2xl bg-white p-8 shadow-lg text-center">
        <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-emerald-100">
          <svg class="h-8 w-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-primary">E-Mail gesendet</h1>
        <p class="mt-4 text-sm text-secondary">
          Falls ein Konto mit dieser E-Mail-Adresse existiert, erhalten Sie in Kürze eine E-Mail mit einem Link zum Zurücksetzen Ihres Passworts.
        </p>
        <a href="{% url 'accounts:login' %}" class="mt-6 inline-block text-sm text-accent hover:underline">
          Zurück zur Anmeldung
        </a>
      </div>
    </div>
  </div>
{% endblock %}
