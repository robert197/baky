<div class="rounded-2xl bg-white p-6 shadow-sm sm:p-8">
  <h2 class="text-xl font-bold text-primary">Plan auswählen</h2>
  <p class="mt-2 text-sm text-secondary">Wählen Sie den passenden Inspektionsplan für Ihre Wohnung.</p>
  <form method="post"
        action="{% url 'accounts:onboarding-plan' %}"
        hx-post="{% url 'accounts:onboarding-plan' %}"
        hx-target="#onboarding-step"
        hx-swap="innerHTML"
        class="mt-6"
        x-data="{ plan: '{{ form.initial.plan|default:"basis" }}' }">
    {% csrf_token %}
    <div class="grid gap-4 sm:grid-cols-2">
      {# Basis #}
      <label class="relative cursor-pointer rounded-xl border-2 p-5 transition"
             :class="plan === 'basis' ? 'border-accent bg-amber-50/50 shadow-sm' : 'border-border hover:border-slate-300'">
        <input type="radio" name="plan" value="basis" class="sr-only" x-model="plan">
        <div class="flex items-start justify-between">
          <div>
            <h3 class="font-bold text-primary">Basis</h3>
            <p class="mt-1 text-sm text-secondary">2 Inspektionen / Monat</p>
          </div>
          <div class="flex h-5 w-5 items-center justify-center rounded-full border-2"
               :class="plan === 'basis' ? 'border-accent bg-accent' : 'border-slate-300'">
            <svg x-show="plan === 'basis'"
                 class="h-3 w-3 text-white"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor"
                 stroke-width="3"
                 aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
          </div>
        </div>
        <div class="mt-3">
          <span class="text-2xl font-bold text-primary">€ 59,90</span>
          <span class="text-sm text-secondary">/ Monat</span>
        </div>
        <ul class="mt-3 space-y-1 text-xs text-secondary">
          <li>Fotodokumentation</li>
          <li>Digitale Berichte</li>
          <li>Sofort-Meldungen</li>
        </ul>
      </label>
      {# Extra #}
      <label class="relative cursor-pointer rounded-xl border-2 p-5 transition"
             :class="plan === 'extra' ? 'border-accent bg-amber-50/50 shadow-sm' : 'border-border hover:border-slate-300'">
        <input type="radio" name="plan" value="extra" class="sr-only" x-model="plan">
        <div class="absolute -top-2.5 left-4">
          <span class="rounded-full bg-accent px-3 py-0.5 text-xs font-semibold text-white">Empfohlen</span>
        </div>
        <div class="flex items-start justify-between">
          <div>
            <h3 class="font-bold text-primary">Extra</h3>
            <p class="mt-1 text-sm text-secondary">4 Inspektionen / Monat</p>
          </div>
          <div class="flex h-5 w-5 items-center justify-center rounded-full border-2"
               :class="plan === 'extra' ? 'border-accent bg-accent' : 'border-slate-300'">
            <svg x-show="plan === 'extra'"
                 class="h-3 w-3 text-white"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor"
                 stroke-width="3"
                 aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
          </div>
        </div>
        <div class="mt-3">
          <span class="text-2xl font-bold text-primary">€ 99,90</span>
          <span class="text-sm text-secondary">/ Monat</span>
        </div>
        <ul class="mt-3 space-y-1 text-xs text-secondary">
          <li>Fotodokumentation</li>
          <li>Digitale Berichte</li>
          <li>Sofort-Meldungen</li>
        </ul>
      </label>
    </div>
    <div class="mt-6 flex gap-3">
      <a href="{% url 'accounts:onboarding-checklist' %}"
         class="rounded-lg border border-border px-4 py-3 text-sm font-medium text-secondary transition hover:bg-slate-50">
        Zurück
      </a>
      <button type="submit"
              class="flex-1 rounded-lg bg-accent px-4 py-3 font-semibold text-white shadow-sm transition hover:bg-amber-600">
        Plan bestätigen
      </button>
    </div>
  </form>
</div>
