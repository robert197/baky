<div class="rounded-2xl bg-white p-6 shadow-sm sm:p-8">
  <div class="text-center">
    <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-emerald-100">
      <svg class="h-8 w-8 text-emerald-500"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor"
           stroke-width="2"
           aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
    </div>
    <h2 class="mt-4 text-xl font-bold text-primary">Fast geschafft!</h2>
    <p class="mt-2 text-sm text-secondary">Überprüfen Sie Ihre Angaben und starten Sie.</p>
  </div>
  <div class="mt-8 space-y-4">
    <div class="rounded-lg border border-border p-4">
      <h3 class="text-sm font-semibold text-secondary">Wohnung</h3>
      <p class="mt-1 text-primary">{{ apartment.address }}</p>
      <p class="text-sm text-secondary">{{ apartment.get_access_method_display }}</p>
    </div>
    <div class="rounded-lg border border-border p-4">
      <h3 class="text-sm font-semibold text-secondary">Checkliste</h3>
      <p class="mt-1 text-primary">{{ checklist_count }} Prüfpunkte</p>
    </div>
    <div class="rounded-lg border border-border p-4">
      <h3 class="text-sm font-semibold text-secondary">Gewählter Plan</h3>
      <p class="mt-1 text-primary">{{ plan_display }}</p>
    </div>
  </div>
  <form method="post" action="{% url 'accounts:onboarding-confirmation' %}" class="mt-8">
    {% csrf_token %}
    <div class="flex gap-3">
      <a href="{% url 'accounts:onboarding-plan' %}"
         class="rounded-lg border border-border px-4 py-3 text-sm font-medium text-secondary transition hover:bg-slate-50">
        Zurück
      </a>
      <button type="submit"
              class="flex-1 rounded-lg bg-accent px-4 py-3 font-semibold text-white shadow-sm transition hover:bg-amber-600">
        Einrichtung abschließen
      </button>
    </div>
  </form>
</div>
