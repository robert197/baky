{# Partial: single photo thumbnail card — used in photo grids and after upload #}
{# Context: photo (Photo instance), inspection (Inspection instance) #}
<div id="photo-{{ photo.pk }}" class="group relative">
  <div class="relative aspect-square overflow-hidden rounded-lg bg-slate-100">
    {% if photo.thumbnail %}
      <img src="{{ photo.get_thumbnail_url }}"
           alt="{{ photo.caption|default:'Foto' }}"
           class="h-full w-full object-cover"
           loading="lazy">
    {% else %}
      <div class="flex h-full w-full items-center justify-center text-slate-400">
        <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </div>
    {% endif %}
    {# Delete button overlay #}
    <button type="button"
            aria-label="Foto löschen"
            class="absolute right-1 top-1 rounded-full bg-black/50 p-1 text-white opacity-0 transition-opacity group-hover:opacity-100 active:opacity-100"
            hx-post="{% url 'inspections:delete_photo' photo.pk %}"
            hx-target="#photo-{{ photo.pk }}"
            hx-swap="outerHTML"
            hx-confirm="Foto löschen?">
      <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
  {% if photo.caption %}<p class="mt-1 truncate text-xs text-secondary">{{ photo.caption }}</p>{% endif %}
</div>
