# =============================================================================
# BAKY Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# =============================================================================

services:
  web:
    build:
      context: .
      target: production
      args:
        GIT_SHA: ${GIT_SHA:-dev}
    command: gunicorn --config gunicorn.conf.py baky.wsgi:application
    environment:
      - DJANGO_SETTINGS_MODULE=baky.settings.production
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    stop_grace_period: 35s
    restart: unless-stopped

  worker:
    build:
      context: .
      target: production
    command: python manage.py qcluster
    environment:
      - DJANGO_SETTINGS_MODULE=baky.settings.production
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_prod:
