name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install ruff djlint

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: djlint lint
        run: djlint templates/ --lint

      - name: djlint format check
        run: djlint templates/ --check

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: baky
          POSTGRES_PASSWORD: baky
          POSTGRES_DB: baky
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U baky"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://baky:baky@localhost:5432/baky
      DJANGO_SETTINGS_MODULE: baky.settings.local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/local.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango1.0-dev libcairo2-dev libgdk-pixbuf-2.0-dev \
            libffi-dev shared-mime-info fonts-liberation \
            libjpeg62-turbo-dev zlib1g-dev libpq-dev

      - name: Install Python dependencies
        run: pip install -r requirements/local.txt

      - name: Django system check
        run: python manage.py check

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests with coverage
        run: >-
          pytest --ignore=tests/e2e
          --create-db
          --cov=apps
          --cov-report=term-missing
          --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
